<main class="container">
  <section class="card">
    <h1>Processamento de Vídeo</h1>

    <label class="file-label" for="videos">Selecionar vídeos</label>
    <input id="videos" type="file" accept="video/*" multiple (change)="selecionarVideos($event)" />

    <button type="button" (click)="enviarVideos()" [disabled]="carregando">
      {{ carregando ? 'Enviando...' : 'Enviar para API de Upload' }}
    </button>

    <div *ngIf="carregando || progresso > 0" class="progress-bar">
      <div class="progress-fill" [style.width.%]="progresso"></div>
      <span>{{ progresso }}%</span>
    </div>

    <p class="mensagem" *ngIf="mensagem">{{ mensagem }}</p>

    <table *ngIf="videos.length > 0">
      <thead>
        <tr>
          <th>Vídeo</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let video of videos">
          <td>{{ video.file.name }}</td>
          <td>{{ video.status }}</td>
          <td>
            <button *ngIf="video.downloadUrl" (click)="baixarVideo(video.downloadUrl)">Baixar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </section>
</main>

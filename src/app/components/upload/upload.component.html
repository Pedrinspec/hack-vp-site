<main class="container">
  <section class="card upload-card">
    <h1>Processamento de Vídeos</h1>

    <div class="upload-controls">
      <label for="videos">Selecione os vídeos</label>
      <input
        id="videos"
        type="file"
        accept="video/*"
        multiple
        (change)="selecionarVideos($event)" />

      <button type="button" (click)="enviarVideos()" [disabled]="carregando">
        {{ carregando ? 'Enviando...' : 'Upload' }}
      </button>
    </div>

    <div *ngIf="carregando || progresso > 0" class="progress-wrapper" aria-live="polite">
      <div class="progress-bar" [style.width.%]="progresso"></div>
      <span>{{ progresso }}%</span>
    </div>

    <p class="mensagem" *ngIf="mensagem">{{ mensagem }}</p>

    <section class="videos-section">
      <h2>Vídeos</h2>
      <table>
        <thead>
          <tr>
            <th>Vídeo</th>
            <th>Status</th>
            <th>Download</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="processamentos.length === 0">
            <td colspan="3" class="empty">Nenhum vídeo processado ainda.</td>
          </tr>
          <tr *ngFor="let item of processamentos">
            <td>{{ item.videoName }}</td>
            <td>
              <span class="status-badge" [ngClass]="statusClasse(item.status)">
                {{ item.status }}
              </span>
            </td>
            <td>
              <button
                *ngIf="item.downloadUrl"
                type="button"
                class="download-btn"
                (click)="baixarImagens(item.downloadUrl)">
                Baixar
              </button>
              <span *ngIf="!item.downloadUrl">-</span>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </section>
</main>

<main class="upload-page">
  <header class="topbar">
    <h1>Página</h1>
  </header>

  <section class="upload-card">
    <div class="upload-controls">
      <input id="videos" type="file" accept="video/*" multiple (change)="selecionarVideos($event)" />
      <button type="button" (click)="enviarVideos()" [disabled]="carregando">
        {{ carregando ? 'enviando...' : 'upload' }}
      </button>
    </div>

    <div *ngIf="carregando || progresso > 0" class="progress-bar">
      <div class="progress-fill" [style.width.%]="progresso"></div>
      <span>{{ progresso }}%</span>
    </div>

    <p class="mensagem" *ngIf="mensagem">{{ mensagem }}</p>
  </section>

  <section class="videos-card">
    <h2>videos</h2>
    <table>
      <thead>
        <tr>
          <th>videos</th>
          <th>status</th>
          <th>download</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="processamentos.length === 0">
          <td colspan="3" class="empty">Nenhum vídeo processado ainda.</td>
        </tr>
        <tr *ngFor="let item of processamentos">
          <td>{{ item.videoName }}</td>
          <td>
            <span class="status-badge" [ngClass]="statusClasse(item.status)">
              {{ item.status }}
            </span>
          </td>
          <td>
            <button
              *ngIf="item.downloadUrl"
              type="button"
              class="download-btn"
              (click)="baixarImagens(item.downloadUrl)">
              baixar
            </button>
            <span *ngIf="!item.downloadUrl">-</span>
          </td>
        </tr>
      </tbody>
    </table>
  </section>
</main>
